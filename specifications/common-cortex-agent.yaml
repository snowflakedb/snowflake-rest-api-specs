components:
  schemas:
    CommonAgentRequest:
      type: object
      required:
      - messages
      properties:
        thread_id:
          type: integer
          format: int64
          description: The id of the thread.
        parent_message_id:
          type: integer
          format: int64
          description: The id of the message from which this run should begin.
        messages:
          type: array
          description: 'If thread id and parent message id are present, the current
            user messages in this conversation turn.

            Else, the conversation history and current message. Contains both user
            queries and assistant responses in chronological order.'
          items:
            $ref: common-cortex-tool.yaml#/components/schemas/Message
          minItems: 1
        tool_choice:
          $ref: common-cortex-tool.yaml#/components/schemas/ToolChoice
        skill_choice:
          $ref: common-cortex-tool.yaml#/components/schemas/SkillChoice
        experimental:
          description: reserved
          type: object
        variables:
          type: object
          description: 'Dictionary of variables with metadata.

            Each variable can include value, type information, and flags indicating
            whether it''s a session or prompt variable.'
        query_tags:
          type: array
          description: 'Query tags to be attached to the Snowflake session. These
            will be applied for all queries executed by the agent.'
          items: {}
        tool_bindings:
          type: object
          description: 'Maps tools to their variable bindings. For each tool, specifies
            which input parameters

            should be automatically injected with variable definitions.'
        origin_application:
          type: string
          description: 'The application that initiated this agent run request.

            Used for tracking and analytics.'
          enum:
          - inline_copilot
          - data_science_agent
          - microsoft_teams
          - coding_agent
          - external
          - snowflake_intelligence
          - mcp
          - agent_admin_ui
          - cortex_code_snowsight
          - autosuggest
          - cortex_code_desktop
          default: external
          example: external
        internal_metadata:
          type: object
          description: 'Internal metadata for the request. This field is reserved
            for internal use.'
        client_metadata:
          type: object
          description: 'Client-provided metadata for the request. Can be used by clients

            to pass additional context or configuration.'
        stream:
          type: boolean
          description: 'Whether to return a streaming response (`text/event-stream`)
            or a non-streaming JSON response (`application/json`).

            If true, the response will be streamed as Server-Sent Events. If false,
            the response will be returned as JSON.'
          default: true
        background:
          type: boolean
          description: Whether to execute this request in background mode (asynchronously).
          default: false
    AgentRunRequest:
      allOf:
      - $ref: '#/components/schemas/CommonAgentRequest'
      - type: object
        description: 'The main request object for running the Cortex agent.

          Contains all necessary information for processing a user query.'
        properties:
          models:
            $ref: common-cortex-tool.yaml#/components/schemas/AgentModels
          orchestration:
            $ref: common-cortex-tool.yaml#/components/schemas/AgentOrchestration
          instructions:
            $ref: common-cortex-tool.yaml#/components/schemas/AgentInstructions
          model:
            type: string
            description: The identifier of the LLM to use for processing.
            example: anthropic-claude-3.5-Sonnet-v2
          response_instruction:
            type: string
            description: 'Optional instructions to guide the model''s response style
              and behavior.

              Can be used to set the tone, format, or specific requirements for responses.'
            example: You will always maintain a friendly tone and provide concise
              responses with bullet points
          tools:
            type: array
            description: 'List of tools available for the agent to use.

              Tools may have a corresponding configuration in tool_resources.'
            items:
              $ref: common-cortex-tool.yaml#/components/schemas/Tool
            example:
            - tool_spec:
                type: cortex_analyst_text_to_sql
                name: Analyst1
          tool_resources:
            $ref: common-cortex-tool.yaml#/components/schemas/ToolResources
          mcp_servers:
            type: array
            description: 'List of MCP (Model Context Protocol) servers to use for
              this request.

              Each server is specified with a server_spec containing its fully qualified
              name.'
            items:
              $ref: common-cortex-tool.yaml#/components/schemas/McpServerWrapper
            example:
            - server_spec:
                name: my_database.my_schema.my_mcp_server
          skills:
            type: array
            description: 'List of skills available for the agent to use.

              Each skill references external code from a stage or git repository.'
            items:
              $ref: common-cortex-tool.yaml#/components/schemas/SkillWrapper
            example:
            - name: my_skill
              source:
                type: STAGE
                path: '@my_database.my_schema.my_stage/skills/'
    DataAgentRunRequest:
      allOf:
      - $ref: '#/components/schemas/CommonAgentRequest'
      - type: object
        properties:
          execution_trace:
            $ref: '#/components/schemas/DataAgentRunRequestExecutionTrace'
    DataAgentRunRequestExecutionTrace:
      type: object
      description: Configuration for execution tracing.
      required:
      - enabled
      properties:
        enabled:
          type: boolean
          description: Whether execution tracing is enabled.
      additionalProperties: true
    ResponseMetadata:
      type: object
      description: 'Additional metadata associated with an agent response.

        This object is intentionally flexible and may contain arbitrary JSON properties.'
      properties:
        usage:
          $ref: '#/components/schemas/UsageMetadata'
        run_id:
          type: string
          description: The unique identifier for this Agent Run. Can be used to reconnect
            to the output stream.
          example: 4264-83472
        thread_id:
          type: integer
          format: int64
          description: The thread ID, if using a thread.
          example: 4264
        user_message_id:
          type: integer
          format: int64
          description: If using a Thread, this is the message ID of the user question
            sent in this request. The `assistant_message_id` is a child of this message.
          example: 83472
        assistant_message_id:
          type: integer
          format: int64
          description: If using a Thread, this is the message ID of this assistant
            response. Use this value as the `parent_message_id` in followup requests.
          example: 83473
      additionalProperties: true
    UsageMetadata:
      type: object
      description: Usage information for this request.
      properties:
        tokens_consumed:
          type: array
          description: Token consumption details per model used in this request.
          items:
            $ref: '#/components/schemas/TokensConsumed'
        limits:
          type: array
          description: Usage limits applicable to this request, if any.
          items:
            $ref: '#/components/schemas/UsageLimit'
      additionalProperties: true
    UsageLimit:
      type: object
      description: A usage limit that applies to this request.
      required:
      - name
      - limit
      - usage
      properties:
        name:
          type: string
          description: The name identifying this limit.
          example: user_daily_estimated_credits
        limit:
          type: number
          format: double
          description: The configured limit value.
        usage:
          type: number
          format: double
          description: The current usage against this limit, including this request.
      additionalProperties: true
    TokensConsumed:
      type: object
      description: Token consumption for a specific model.
      required:
      - model_name
      - input_tokens
      - output_tokens
      - context_window
      properties:
        model_name:
          type: string
          description: Name of the model used.
          example: llama3.1-70b
        input_tokens:
          $ref: '#/components/schemas/InputTokens'
        output_tokens:
          $ref: '#/components/schemas/OutputTokens'
        context_window:
          type: integer
          format: int64
          description: The model's context window size (in tokens).
          example: 128000
      additionalProperties: true
    InputTokens:
      type: object
      description: Input token breakdown by cache usage.
      required:
      - total
      - cache_read
      - cache_write
      - uncached
      properties:
        total:
          type: integer
          format: int64
          description: Total input tokens processed (including cached tokens).
          example: 175
        cache_read:
          type: integer
          format: int64
          description: Input tokens read from cache.
          example: 50
        cache_write:
          type: integer
          format: int64
          description: Input tokens written to cache.
          example: 25
        uncached:
          type: integer
          format: int64
          description: Input tokens that were not cached.
          example: 100
      additionalProperties: true
    OutputTokens:
      type: object
      description: Output token details.
      required:
      - total
      properties:
        total:
          type: integer
          format: int64
          description: Total output tokens generated.
          example: 75
      additionalProperties: true
